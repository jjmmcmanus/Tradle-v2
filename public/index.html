
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tradle — Trading & TnB Wordle</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;color:#eee;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:1.5rem 1rem}
  h1{font-size:22px;font-weight:600;letter-spacing:3px;color:#fff;margin-bottom:4px;text-align:center}
  #subtitle{font-size:12px;color:#888;margin-bottom:12px;text-align:center}

  /* Layout — game in centre, leaderboard panel on the right */
  #layout{display:flex;gap:24px;align-items:flex-start;width:100%;max-width:900px;justify-content:center}
  #game-col{display:flex;flex-direction:column;align-items:center;flex:0 0 auto}
  #leaderboard-col{flex:0 0 240px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:14px;display:none}
  #leaderboard-col h3{font-size:13px;font-weight:600;color:#eee;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
  #leaderboard-col .lb-date{font-size:10px;color:#555;font-weight:400;margin-bottom:12px}
  .lb-entry{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #222;font-size:12px}
  .lb-entry:last-child{border-bottom:none}
  .lb-pos{color:#888;width:20px;font-weight:600}
  .lb-name{flex:1;color:#ddd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
  .lb-score{font-weight:600;color:#aaa;font-size:11px}
  .lb-score.win{color:#7CCB57}
  .lb-score.lose{color:#888}
  .lb-empty{font-size:11px;color:#555;text-align:center;padding:10px 0;font-style:italic}
  .lb-stats{font-size:10px;color:#666;margin-top:10px;padding-top:10px;border-top:1px solid #222;text-align:center}

  #legend{display:flex;gap:14px;font-size:11px;color:#888;margin-bottom:14px;justify-content:center}
  .leg{width:14px;height:14px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:middle}
  .leg-g{background:#3B6D11}.leg-y{background:#BA7517}.leg-x{background:#5F5E5A}
  #board{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
  .row{display:flex;gap:6px}

  /* Tile flip animation */
  .tile{width:54px;height:54px;border:1.5px solid #444;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;color:#eee;text-transform:uppercase;perspective:600px;transform-style:preserve-3d}
  .tile.flip{animation:flip 0.55s ease forwards}
  @keyframes flip{
    0%{transform:rotateX(0deg);background:transparent;border-color:#aaa}
    49%{transform:rotateX(90deg);background:transparent;border-color:#aaa;color:#eee}
    50%{transform:rotateX(90deg)}
    100%{transform:rotateX(0deg)}
  }
  .tile.g{background:#3B6D11;border-color:#3B6D11;color:#C0DD97}
  .tile.y{background:#BA7517;border-color:#BA7517;color:#FAC775}
  .tile.x{background:#3a3a3a;border-color:#3a3a3a;color:#888}
  .tile.filled{border-color:#aaa}
  .tile.pop{animation:pop 0.1s ease}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
  .tile.shake{animation:shake 0.4s ease}
  @keyframes shake{0%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}100%{transform:translateX(0)}}

  /* Win bounce */
  .tile.bounce{animation:bounce 0.7s ease}
  @keyframes bounce{
    0%,100%{transform:translateY(0)}
    20%{transform:translateY(-18px)}
    40%{transform:translateY(0)}
    50%{transform:translateY(-9px)}
    60%{transform:translateY(0)}
    80%{transform:translateY(-3px)}
  }

  #msg{height:26px;font-size:13px;font-weight:600;color:#fff;text-align:center;margin-bottom:6px}
  #day-label{font-size:11px;color:#555;margin-bottom:10px;text-align:center}
  #keyboard{display:flex;flex-direction:column;gap:7px;align-items:center;margin-bottom:14px}
  .kb-row{display:flex;gap:5px}
  .key{height:42px;min-width:34px;padding:0 7px;border-radius:5px;border:none;background:#333;color:#eee;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
  .key:hover{background:#444}
  .key.wide{min-width:54px;font-size:11px}
  .key.g{background:#3B6D11;color:#C0DD97}
  .key.y{background:#BA7517;color:#FAC775}
  .key.x{background:#2a2a2a;color:#666}
  #word-count{font-size:10px;color:#555;margin-top:10px;text-align:center}
  #user-bar{font-size:12px;color:#666;margin-bottom:8px;text-align:center}
  #user-bar span{color:#aaa;font-weight:500}

  #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;min-height:60vh;text-align:center}
  #login-screen h2{font-size:18px;font-weight:500;color:#eee}
  #login-screen p{font-size:13px;color:#888;max-width:280px;line-height:1.6}
  #discord-login-btn{display:flex;align-items:center;gap:10px;padding:12px 24px;background:#5865F2;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.15s}
  #discord-login-btn:hover{background:#4752c4}
  #discord-login-btn svg{width:24px;height:24px}

  #played-screen{display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;padding:1rem 0}
  #played-screen h2{font-size:18px;font-weight:500}
  #played-screen p{font-size:13px;color:#888;line-height:1.6}
  .result-grid{display:flex;flex-direction:column;gap:4px;margin:8px 0}
  .result-row{display:flex;gap:4px;justify-content:center}
  .result-tile{width:28px;height:28px;border-radius:4px}
  .result-tile.g{background:#3B6D11}
  .result-tile.y{background:#BA7517}
  .result-tile.x{background:#3a3a3a}
  #copy-result-btn{padding:8px 20px;border-radius:6px;border:1.5px solid #444;background:#222;color:#eee;font-size:13px;cursor:pointer}
  #copy-result-btn:hover{background:#333}
  #next-word-timer{font-size:12px;color:#555;margin-top:4px}

  #game-area{display:none;flex-direction:column;align-items:center;width:100%}

  @media (max-width: 720px) {
    #layout{flex-direction:column}
    #leaderboard-col{flex:none;width:100%;max-width:340px}
  }
</style>
</head>

const ROWS=6,COLS=5;
let secret,currentRow,currentCol,grid,gameOver,keyState;
let currentUser=null;
let guessHistory=[];
let lbInterval=null;

function getUKDateString(){return new Date().toLocaleDateString('en-GB',{timeZone:'Europe/London'});}
function hashStr(str){let h=0;for(let i=0;i<str.length;i++){h=(Math.imul(31,h)+str.charCodeAt(i))|0;}return Math.abs(h);}
function getDailyWord(){return WORDS[hashStr(getUKDateString())%WORDS.length];}

function discordLogin(){
  const clientId = window.DISCORD_CLIENT_ID || 'YOUR_CLIENT_ID';
  const redirect = encodeURIComponent(window.location.origin+'/auth/callback');
  window.location.href = `https://discord.com/oauth2/authorize?client_id=${clientId}&redirect_uri=${redirect}&response_type=code&scope=identify`;
}

async function checkSession(){
  try { const res = await fetch('/auth/me'); if(res.ok) return await res.json(); } catch(e){}
  return null;
}

async function checkAlreadyPlayed(userId){
  try { const res = await fetch(`/api/score?userId=${userId}&date=${getUKDateString()}`); if(res.ok) return await res.json(); } catch(e){}
  return null;
}

async function submitScore(userId, username, tries, won, guesses){
  try { await fetch('/api/score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId,username,tries,won,guesses,date:getUKDateString()})}); } catch(e){}
}

async function fetchLeaderboard(){
  try {
    const res = await fetch('/api/leaderboard');
    if(!res.ok) return;
    const data = await res.json();
    renderLeaderboard(data.scores||[]);
  } catch(e){}
}

function renderLeaderboard(scores){
  const list = document.getElementById('lb-list');
  document.getElementById('lb-date').textContent = getUKDateString();
  if(!scores.length){
    list.innerHTML = '<div class="lb-empty">No one has played yet.</div>';
    return;
  }
  let html = '';
  const medals = ['🥇','🥈','🥉'];
  scores.forEach((s,i) => {
    const pos = medals[i] || `${i+1}.`;
    const score = s.won ? `${s.tries}/6` : 'X/6';
    const cls = s.won ? 'win' : 'lose';
    html += `<div class="lb-entry"><span class="lb-pos">${pos}</span><span class="lb-name">${escapeHtml(s.username)}</span><span class="lb-score ${cls}">${score}</span></div>`;
  });
  const solvers = scores.filter(s=>s.won).length;
  html += `<div class="lb-stats">${solvers}/${scores.length} solved today</div>`;
  list.innerHTML = html;
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

async function startApp(){
  const user = await checkSession();
  if(!user){
    document.getElementById('login-screen').style.display='flex';
    return;
  }
  currentUser = user;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('layout').style.display='flex';
  document.getElementById('leaderboard-col').style.display='block';

  // Start polling leaderboard every 15s
  fetchLeaderboard();
  lbInterval = setInterval(fetchLeaderboard, 15000);

  const existing = await checkAlreadyPlayed(user.id);
  if(existing && existing.submitted){
    showAlreadyPlayed(user, existing);
    return;
  }
  document.getElementById('username-display').textContent = user.username;
  document.getElementById('game-area').style.display='flex';
  initGame();
}

function showAlreadyPlayed(user, data){
  document.getElementById('game-area').style.display='none';
  document.getElementById('played-screen').style.display='flex';
  const won = data.won;
  const tries = data.tries;
  document.getElementById('played-title').textContent = won ? `You got it in ${tries}!` : "Better luck tomorrow!";
  document.getElementById('played-subtitle').textContent = won
    ? `Nice one ${user.username} — come back at midnight for a new word.`
    : `Come back at midnight UK time for a new word.`;
  const grid = document.getElementById('result-grid-display');
  grid.innerHTML='';
  if(data.guesses){
    data.guesses.forEach(row=>{
      const rowEl=document.createElement('div');rowEl.className='result-row';
      row.forEach(s=>{const t=document.createElement('div');t.className='result-tile '+s;rowEl.appendChild(t);});
      grid.appendChild(rowEl);
    });
  } else if(guessHistory.length){
    guessHistory.forEach(row=>{
      const rowEl=document.createElement('div');rowEl.className='result-row';
      row.forEach(s=>{const t=document.createElement('div');t.className='result-tile '+s;rowEl.appendChild(t);});
      grid.appendChild(rowEl);
    });
  }
  updateCountdown();
  setInterval(updateCountdown,1000);
}

function updateCountdown(){
  const now = new Date();
  const ukNow = new Date(now.toLocaleString('en-US',{timeZone:'Europe/London'}));
  const midnight = new Date(ukNow);
  midnight.setHours(24,0,0,0);
  const diff = midnight - ukNow;
  const h=Math.floor(diff/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  const el = document.getElementById('next-word-timer');
  if(el) el.textContent=`Next word in ${h}h ${m}m ${s}s`;
}

function copyResult(){
  const dateStr = getUKDateString();
  let txt = `Tradle — ${dateStr}\n\n`;
  const guesses = guessHistory.length ? guessHistory : [];
  guesses.forEach(row=>{txt += row.map(s=>s==='g'?'🟩':s==='y'?'🟨':'⬛').join('')+'\n';});
  navigator.clipboard&&navigator.clipboard.writeText(txt);
  const btn=document.getElementById('copy-result-btn');
  btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy result',1500);
}

function initGame(){
  secret=getDailyWord();
  currentRow=0;currentCol=0;gameOver=false;guessHistory=[];
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(''));keyState={};
  renderBoard();renderKeyboard();setMsg('');
  const ukDate=new Date().toLocaleDateString('en-GB',{timeZone:'Europe/London',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('day-label').textContent='Daily word — '+ukDate;
  document.getElementById('word-count').textContent=WORDS.length+' words in the pool';
}

function renderBoard(){
  const b=document.getElementById('board');b.innerHTML='';
  for(let r=0;r<ROWS;r++){
    const row=document.createElement('div');row.className='row';row.id='row-'+r;
    for(let c=0;c<COLS;c++){
      const t=document.createElement('div');t.className='tile';t.id=`t-${r}-${c}`;row.appendChild(t);
    }
    b.appendChild(row);
  }
}

function renderKeyboard(){
  const rows=['QWERTYUIOP','ASDFGHJKL','←ZXCVBNM↵'];
  const kb=document.getElementById('keyboard');kb.innerHTML='';
  rows.forEach(r=>{
    const row=document.createElement('div');row.className='kb-row';
    [...r].forEach(k=>{
      const btn=document.createElement('button');
      btn.className='key'+(k==='←'||k==='↵'?' wide':'');
      btn.textContent=k;btn.dataset.key=k;
      btn.addEventListener('click',()=>handleKey(k));
      row.appendChild(btn);
    });
    kb.appendChild(row);
  });
}

function setLetter(r,c,letter){
  const t=document.getElementById(`t-${r}-${c}`);
  t.textContent=letter;
  t.className='tile'+(letter?' filled':'');
  if(letter){t.classList.add('pop');setTimeout(()=>t.classList.remove('pop'),150);}
}

// Animated tile reveal with flip
function revealTile(r,c,letter,state,delay){
  const t=document.getElementById(`t-${r}-${c}`);
  setTimeout(()=>{
    t.classList.add('flip');
    setTimeout(()=>{
      t.classList.remove('flip','filled');
      t.classList.add(state);
      t.textContent=letter;
    },275);
  },delay);
}

function setMsg(m){document.getElementById('msg').textContent=m;}

function handleKey(k){
  if(gameOver)return;
  if(k==='←'||k==='Backspace'){if(currentCol>0){currentCol--;grid[currentRow][currentCol]='';setLetter(currentRow,currentCol,'');}}
  else if(k==='↵'||k==='Enter'){submit();}
  else if(/^[A-Z]$/.test(k)&&currentCol<COLS){grid[currentRow][currentCol]=k;setLetter(currentRow,currentCol,k);currentCol++;}
}

function submit(){
  if(currentCol<COLS){shakeRow(currentRow);setMsg('Need 5 letters!');setTimeout(()=>setMsg(''),1200);return;}
  const guess=grid[currentRow].join('');
  if(!VALID.has(guess)){shakeRow(currentRow);setMsg('Not a valid word!');setTimeout(()=>setMsg(''),1500);return;}
  const result=score(guess,secret);
  guessHistory.push(result);

  // Animate tile flip with stagger
  const r = currentRow;
  result.forEach((s,c)=>revealTile(r,c,grid[r][c],s,c*250));

  // Wait for all tiles to flip before checking win/loss
  setTimeout(()=>{
    result.forEach((s,c)=>{const k=grid[r][c];const order={g:3,y:2,x:1};if(!keyState[k]||order[s]>order[keyState[k]])keyState[k]=s;});
    updateKeyColors();
    const tries=r+1;
    if(guess===secret){
      gameOver=true;
      submitScore(currentUser.id,currentUser.username,tries,true,guessHistory);
      // Win bounce
      result.forEach((_,c)=>{
        setTimeout(()=>{
          const t=document.getElementById(`t-${r}-${c}`);
          t.classList.add('bounce');
          setTimeout(()=>t.classList.remove('bounce'),700);
        },c*100);
      });
      const msgs=['Legendary!','To the moon!','Easy money!','Nice trade!','Profitable!','That works!'];
      setMsg(msgs[Math.min(r,msgs.length-1)]);
      setTimeout(()=>{showAlreadyPlayed(currentUser,{won:true,tries,guesses:guessHistory});fetchLeaderboard();},2200);
    } else if(r===ROWS-1){
      gameOver=true;
      submitScore(currentUser.id,currentUser.username,7,false,guessHistory);
      setMsg('Better luck tomorrow!');
      setTimeout(()=>{showAlreadyPlayed(currentUser,{won:false,tries:7,guesses:guessHistory});fetchLeaderboard();},2000);
    }
  }, 5*250 + 300);

  currentRow++;currentCol=0;
}

function score(guess,answer){
  const res=Array(5).fill('x'),pool=[...answer];
  for(let i=0;i<5;i++)if(guess[i]===answer[i]){res[i]='g';pool[pool.indexOf(guess[i])]='_';}
  for(let i=0;i<5;i++)if(res[i]!=='g'){const j=pool.indexOf(guess[i]);if(j>-1){res[i]='y';pool[j]='_';}}
  return res;
}

function updateKeyColors(){
  document.querySelectorAll('.key').forEach(btn=>{
    const k=btn.dataset.key;if(keyState[k])btn.className='key'+(btn.classList.contains('wide')?' wide':'')+' '+keyState[k];
  });
}

function shakeRow(r){
  const row=document.getElementById('row-'+r);
  row.querySelectorAll('.tile').forEach(t=>{t.classList.add('shake');setTimeout(()=>t.classList.remove('shake'),400);});
}

document.addEventListener('keydown',e=>{
  if(e.key==='Backspace')handleKey('←');
  else if(e.key==='Enter')handleKey('↵');
  else if(/^[a-zA-Z]$/.test(e.key))handleKey(e.key.toUpperCase());
});

startApp();
</script>
</body>
</html>
